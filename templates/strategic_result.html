<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapport Stratégique - Module IA</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">
          <img class="logo" src="/static/logo.png" alt="Logo" />
          <div class="brand-text">
            <h1>Rapport Stratégique — Aide à la Décision</h1>
            <p class="subtitle">Source analysée : <strong>{{ source_name }}</strong></p>
          </div>
        </div>
        <div class="actions">
          <a class="btn secondary" href="/strategic">Nouvelle analyse</a>
          <a class="btn secondary" href="/">Analyse de page</a>
          <a class="btn" href="/reports/{{ pdf_filename }}" style="background: linear-gradient(180deg, rgba(26,58,92,0.95), rgba(15,35,60,0.95)); border-color: rgba(26,58,92,0.30);">
            Télécharger PDF
          </a>
        </div>
      </header>

      <section class="card">
        <h2>Recommandations décisionnelles (texte)</h2>
        <pre class="report">{{ analysis_text }}</pre>
      </section>
    </div>
  </body>
</html>
